<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post-its con Gestos (Puño Cerrado - Modo Privado)</title>
    
    <!-- Importar MediaPipe y librerías de cámara -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Video oculto para privacidad */
        #webcam {
            display: none;
        }

        /* Puntero virtual */
        #pointer {
            position: fixed;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background-color: #38ef7d; /* Verde = Mano abierta / buscando */
            border: 3px solid white;
            box-shadow: 0 0 15px rgba(56, 239, 125, 0.6);
            pointer-events: none; 
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: background-color 0.1s ease, transform 0.1s ease;
        }

        /* Cambia cuando detecta el puño cerrado (agarre) */
        #pointer.grabbing {
            background-color: #ff4757; /* Rojo = Puño cerrado / Agarrado */
            box-shadow: 0 0 15px rgba(255, 71, 87, 0.8);
            transform: translate(-50%, -50%) scale(1.4);
        }

        /* Estilos de los Post-its */
        .postit {
            position: absolute;
            width: 200px;
            height: 200px;
            padding: 25px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            font-size: 16px;
            color: #2c3e50;
            cursor: move;
            user-select: none;
            box-sizing: border-box;
            border-radius: 4px;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        .postit:nth-child(1) { background-color: #fffaa0; left: 150px; top: 200px; transform: rotate(-1.5deg); }
        .postit:nth-child(2) { background-color: #ffb7b2; left: 450px; top: 250px; transform: rotate(2deg); }
        .postit:nth-child(3) { background-color: #b5ead7; left: 750px; top: 180px; transform: rotate(-1deg); }

        .postit.held {
            box-shadow: 15px 20px 30px rgba(0,0,0,0.2);
            transform: scale(1.05) rotate(0deg) !important;
            z-index: 50;
        }

        #instrucciones {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 30px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            z-index: 10;
        }

        h2 { margin: 0 0 5px 0; font-size: 1.2rem; color: #333; }
        p { margin: 0; font-size: 0.9rem; color: #7f8c8d; }
    </style>
</head>
<body>

    <div id="instrucciones">
        <h2>🔒 Modo Privado Activo (Video oculto)</h2>
        <p id="status">Iniciando visión artificial...</p>
    </div>

    <!-- Notas Adhesivas -->
    <div class="postit" id="p1"><strong>Control por Puño</strong><br><br>Cierra la mano por completo para arrastrarme.</div>
    <div class="postit" id="p2"><strong>Detección de flexión</strong><br><br>La IA mide si tus dedos se esconden en la palma.</div>
    <div class="postit" id="p3"><strong>Mano Abierta</strong><br><br>Abre la mano en cualquier momento para soltar la nota.</div>

    <!-- Elementos del sistema -->
    <div id="pointer"></div>
    <video id="webcam" autoplay playsinline></video>

    <script>
        const videoElement = document.getElementById('webcam');
        const pointer = document.getElementById('pointer');
        const statusText = document.getElementById('status');
        const postits = document.querySelectorAll('.postit');

        let activePostit = null;
        let offsetX = 0;
        let offsetY = 0;

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.75,
            minTrackingConfidence: 0.75
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        
        camera.start()
            .then(() => statusText.innerText = "¡IA Lista! Cierra el puño para agarrar las notas y ábrelo para soltarlas.")
            .catch(err => statusText.innerText = "Error de acceso a cámara: " + err);

        // Función para verificar si el puño está cerrado
        function esPunoCerrado(landmarks) {
            // Emparejamos la punta de cada dedo con su nudillo correspondiente
            // Puntas: Índice (8), Medio (12), Anular (16), Meñique (20)
            // Nudillos de referencia: Índice (5), Medio (9), Anular (13), Meñique (17)
            const dedos = [
                { punta: 8, nudillo: 5 },
                { punta: 12, nudillo: 9 },
                { punta: 16, nudillo: 13 },
                { punta: 20, nudillo: 17 }
            ];

            // Si la punta del dedo está más abajo (Y mayor) que el nudillo en la pantalla, el dedo está encogido.
            // Contamos cuántos dedos cumplen esta condición.
            let dedosCerrados = 0;
            dedos.forEach(dedo => {
                if (landmarks[dedo.punta].y > landmarks[dedo.nudillo].y) {
                    dedosCerrados++;
                }
            });

            // Consideramos puño cerrado si al menos 3 de los 4 dedos largos están encogidos
            return dedosCerrados >= 3;
        }

        function onResults(results) {
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                pointer.style.display = 'none';
                if (activePostit) soltarPostit();
                return;
            }

            pointer.style.display = 'block';
            const landmarks = results.multiHandLandmarks[0];

            // Usamos el centro de la palma (punto 9, base del dedo medio) como la ubicación del puntero
            const centroMano = landmarks[9];
            const midX = (1 - centroMano.x) * window.innerWidth;
            const midY = centroMano.y * window.innerHeight;

            // Actualizar posición del puntero en pantalla
            pointer.style.left = `${midX}px`;
            pointer.style.top = `${midY}px`;

            // Evaluar el gesto del puño
            if (esPunoCerrado(landmarks)) {
                pointer.classList.add('grabbing');
                
                if (!activePostit) {
                    // Detectar colisión con los post-its
                    postits.forEach(postit => {
                        const rect = postit.getBoundingClientRect();
                        if (midX >= rect.left && midX <= rect.right && midY >= rect.top && midY <= rect.bottom) {
                            activePostit = postit;
                            activePostit.classList.add('held');
                            offsetX = midX - rect.left;
                            offsetY = midY - rect.top;
                        }
                    });
                } else {
                    // Mover nota seleccionada
                    activePostit.style.left = `${midX - offsetX}px`;
                    activePostit.style.top = `${midY - offsetY}px`;
                }
            } else {
                pointer.classList.remove('grabbing');
                if (activePostit) soltarPostit();
            }
        }

        function soltarPostit() {
            if (activePostit) {
                activePostit.classList.remove('held');
                activePostit = null;
            }
        }
    </script>
</body>
</html>
